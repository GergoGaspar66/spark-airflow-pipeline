name: Prefect Modular PySpark ETL with Delta Lake

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
permissions:
  contents: write  

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Ez a paraméter kötelező, hogy a GitHub Actions-nek legyen joga később visszaírni a repóba
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Empty Folders
        run: |
          mkdir -p raw data/bronze data/silver data/gold processed/bronze processed/silver processed/gold

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Java (JRE) for PySpark
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jre-headless
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

      - name: Install Prefect, PySpark and Delta Lake
        run: |
          python -m pip install --upgrade pip
          pip install griffe==0.45.0 "pydantic<2.0" prefect==2.14.21 pyspark==3.4.1 delta-spark==2.4.0

      - name: Run Prefect Medallion Pipeline
        run: |
          export PREFECT_API_URL=""
          python medallion_orchestrator.py

      - name: Commit and Push Processed Data back to Repo
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          # Hozzáadjuk a generált adatokat és az archivált raw fájlokat (Kényszerítve a -f kapcsolóval, ha a .gitignore tiltaná)
          git add -f data/ processed/ logs/ raw/
          
          # Csak akkor commitolunk, ha tényleg változott valami
          git diff-index --quiet HEAD || git commit -m "Automatikus Medallion adatok frissítése [Skip CI]"
          
          # Visszatoljuk a main ágra
          git push origin main
