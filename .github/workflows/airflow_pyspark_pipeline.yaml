name: Airflow PySpark ETL Runner

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      # 1. Lépés: Kód letöltése
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Lépés: Mappák létrehozása
      - name: Create Empty Folders
        run: |
          mkdir -p data/bronze data/silver data/gold processed/bronze processed/silver processed/gold

      # 3. Lépés: Airflow indítása
      - name: Start Airflow with Docker Compose
        run: |
          echo "AIRFLOW_UID=$(id -u)" > .env
          docker compose up --build -d

      # 4. Lépés: Várunk kicsit, hogy a Docker generálja a hibákat
      - name: Wait for Logs
        run: sleep 20

      # 5. Lépés: KIOLVASSUK A VALÓDI HIBÁT
      - name: Read Docker Crash Logs
        run: |
          echo "=== 1. Melyik konténer omlott össze? (Státusz lista) ==="
          docker compose ps
          
          echo "=== 2. Miért állt le a Webserver? (Hibanapló) ==="
          docker compose logs --tail=50 airflow-webserver
