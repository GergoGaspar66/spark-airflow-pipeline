name: Airflow PySpark ETL Runner

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      # 1. Lépés: Kód letöltése
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Lépés: Mappák létrehozása
      - name: Create Empty Folders
        run: |
          mkdir -p data/bronze data/silver data/gold processed/bronze processed/silver processed/gold

      # 3. Lépés: Bejelentkezés a Docker Hubra
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. Lépés: Docker Compose elindítása
      - name: Start Airflow with Docker Compose
        run: |
          echo "AIRFLOW_UID=$(id -u)" > .env
          docker compose up --build -d

      # 5. Lépés: Várunk kicsit, hogy a Docker generálja a logokat
      - name: Wait for Containers
        run: sleep 40

      # 6. Lépés: KIOLVASSUK A VALÓDI HIBÁT
      - name: Read Docker Crash Logs
        run: |
          echo "=== 1. Konténerek állapota (Melyik fut és melyik omlott össze?) ==="
          docker compose ps
          
          echo "=== 2. Miért állt le az Inicializálás? (airflow-init logok) ==="
          docker compose logs --tail=50 airflow-init
          
          echo "=== 3. Miért nem indul el a Webserver? (airflow-webserver logok) ==="
          docker compose logs --tail=50 airflow-webserver
