name: Airflow PySpark ETL Runner

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      # 1. Lépés: Kód letöltése
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Lépés: Mappák létrehozása
      - name: Create Empty Folders
        run: |
          mkdir -p data/bronze data/silver data/gold processed/bronze processed/silver processed/gold

      # 3. Lépés: Bejelentkezés a Docker Hubra
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. Lépés: Docker Compose elindítása (Ez most már a beépített curl-lel épül fel!)
      - name: Start Airflow with Docker Compose
        run: |
          echo "AIRFLOW_UID=$(id -u)" > .env
          docker compose up --build -d

      # 5. Lépés: Várakozás és a DAG elindítása a beépített curl-lel
      - name: Wait for Airflow API and Trigger DAG
        run: |
          echo "Várakozás az Airflow és az adatbázis beindulására (45 másodperc)..."
          sleep 45
          
          echo "=== Medallion Pipeline indítása a beépített curl segítségével ==="
          docker compose exec -T airflow-webserver curl -X POST "http://localhost:8080/api/v1/dags/medallion_full_pipeline/dagRuns" \
          -H "Content-Type: application/json" \
          --user "airflow:airflow" \
          -d '{}'

      # 6. Lépés: Várakozás a PySpark feladat lefutására és a státusz ellenőrzése
      - name: Check DAG Execution Status
        run: |
          echo "Várakozás 50 másodpercet a PySpark feladat futására..."
          sleep 50
          
          echo "=== Pipeline legfrissebb futási státusza ==="
          docker compose exec -T airflow-webserver curl -s "http://localhost:8080/api/v1/dags/medallion_full_pipeline/dagRuns?limit=1&order_by=-start_date" \
          --user "airflow:airflow"
