name: Airflow PySpark ETL Runner

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      # 1. Lépés: Kód letöltése
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Lépés: Mappák létrehozása
      - name: Create Empty Folders
        run: |
          mkdir -p data/bronze data/silver data/gold processed/bronze processed/silver processed/gold

      # 3. Lépés: Airflow indítása
      - name: Start Airflow with Docker Compose
        run: |
          echo "AIRFLOW_UID=$(id -u)" > .env
          docker compose up --build -d

      # 4. és 5. Lépés: Várakozás a webserverre és a DAG elindítása API-n keresztül
      - name: Wait for Airflow API and Trigger DAG
        run: |
          echo "Várakozás az Airflow webserver elindulására..."
          
          # Max 30-szor próbálkozunk, 10 másodperces szünetekkel
          for i in {1..30}; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/health || echo "000")
            echo "Airflow webserver HTTP kód: $HTTP_STATUS"
            
            if [ "$STATUS" == "200" ] || [ "$HTTP_STATUS" == "200" ]; then
              echo "Az Airflow elérhető! Pipeline indítása..."
              
              # DAG indítása a hivatalos REST API-n keresztül
              curl -X POST "http://localhost:8080/api/v1/dags/medallion_full_pipeline/dagRuns" \
              -H "Content-Type: application/json" \
              --user "airflow:airflow" \
              -d '{}'
              
              exit 0
            fi
            
            sleep 10
          done
          
          echo "HIBA: Az Airflow nem válaszolt időben!"
          docker compose ps
          exit 1

      # 6. Lépés: Várakozás és a futási státusz ellenőrzése
      - name: Check DAG Execution Status
        run: |
          echo "Várakozás 50 másodpercet a PySpark feladat futására..."
          sleep 50
          
          echo "=== Pipeline legfrissebb futási státusza ==="
          curl -X GET "http://localhost:8080/api/v1/dags/medallion_full_pipeline/dagRuns?limit=1&order_by=-start_date" \
          --user "airflow:airflow"
