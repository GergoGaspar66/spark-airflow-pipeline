name: Airflow PySpark ETL Runner

on:
  push:
    branches:
      - main  # Akkor indul el, ha a main ágra commitolsz
  workflow_dispatch: # Ez gombot add a GitHub felületén, hogy manuálisan is el tued indítani tesztelésre

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      # 1. Lépés: A GitHubról letöltjük a kódjaidat a virtuális gépre
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Lépés: Létrehozzuk az üres mappákat a GitHub virtuális gépén
      - name: Create Empty Folders
        run: |
          mkdir -p data/bronze data/silver data/gold processed/bronze processed/silver processed/gold

      # 3. Lépés: Docker Compose elindítása a te beállításaiddal
      - name: Start Airflow with Docker Compose
        run: |
          echo "AIRFLOW_UID=$(id -u)" > .env
          docker compose up --build -d

      # 4. Lépés: Várunk, hogy az Airflow teljesen beinduljon
      - name: Wait for Airflow to be healthy
        run: |
          echo "Várakozás az Airflow és a háttérrendszerek indulására..."
          sleep 40

      # 5. Lépés: A meglévő webserver környezet használata új konténerként a DAG indításához
      - name: Trigger Airflow DAG
        run: |
          docker compose run --rm airflow-webserver airflow dags trigger medallion_full_pipeline
          echo "Várakozás a PySpark feladat lefutására..."
          sleep 50

      # 6. Lépés: A meglévő webserver környezet használata új konténerként a státusz ellenőrzéséhez
      - name: Check DAG Execution Logs
        run: |
          docker compose run --rm airflow-webserver airflow dags state medallion_full_pipeline
