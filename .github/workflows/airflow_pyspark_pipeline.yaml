name: Airflow PySpark ETL Runner (Nyomozó verzió)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      # 1. Lépés: Kód letöltése
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Lépés: Mappák létrehozása
      - name: Create Empty Folders
        run: |
          mkdir -p data/bronze data/silver data/gold processed/bronze processed/silver processed/gold

      # 3. Lépés: Airflow indítása
      - name: Start Airflow with Docker Compose
        run: |
          echo "AIRFLOW_UID=$(id -u)" > .env
          docker compose up --build -d

      # 4. Lépés: Várakozás az indulásra
      - name: Wait for Airflow to be healthy
        run: |
          echo "Várakozás az Airflow és a háttérrendszerek indulására..."
          sleep 40

      # 5. Lépés: NYOMOZÁS - Megkeressük az airflow parancsot a konténerben
      - name: Locate Airflow Inside Container
        run: |
          echo "=== 1. PRÓBA: Hol van az airflow parancs a PATH-ban? ==="
          docker compose exec -T airflow-webserver which airflow || echo "Sima 'which' nem talalta"
          
          echo "=== 2. PRÓBA: Kereses az egesz kontenerben... ==="
          docker compose exec -T --user root airflow-webserver find / -name "airflow" -type f 2>/dev/null || echo "A find nem talalt semmit"

      # 6. Lépés: Megnézzük a futó konténereket és környezeti változóikat
      - name: Debug Docker Environment
        run: |
          echo "=== Futó konténerek listája ==="
          docker compose ps
          
          echo "=== Konténer belső PATH változója ==="
          docker compose exec -T airflow-webserver env | grep PATH || echo "Nem sikerult lemerni az env-et"
