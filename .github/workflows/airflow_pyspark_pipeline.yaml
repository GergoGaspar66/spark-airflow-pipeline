name: Airflow PySpark ETL Runner (Nyomozó verzió)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      # 1. Lépés: Kód letöltése
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Lépés: Mappák létrehozása
      - name: Create Empty Folders
        run: |
          mkdir -p data/bronze data/silver data/gold processed/bronze processed/silver processed/gold

      # 3. Lépés: Airflow indítása
      - name: Start Airflow with Docker Compose
        run: |
          echo "AIRFLOW_UID=$(id -u)" > .env
          docker compose up --build -d

      # 4. Lépés: Várakozás az indulásra
      - name: Wait for Airflow to be healthy
        run: |
          echo "Várakozás az Airflow és a háttérrendszerek indulására..."
          sleep 40

      # 5. Lépés: Megpróbáljuk triggerelni a DAG-ot az összes létező szolgáltatáson keresztül
      - name: Try Triggering DAG On All Available Services
        run: |
          echo "=== Próba a scheduler konténerrel (ha létezik) ==="
          docker compose exec -T airflow-scheduler airflow dags trigger medallion_full_pipeline || echo "A scheduler nem elérhető vagy nincs benne airflow"
          
          echo "=== Próba a worker konténerrel (ha létezik) ==="
          docker compose exec -T airflow-worker airflow dags trigger medallion_full_pipeline || echo "A worker nem elérhető vagy nincs benne airflow"
          
          echo "=== Próba a triggerer konténerrel (ha létezik) ==="
          docker compose exec -T airflow-triggerer airflow dags trigger medallion_full_pipeline || echo "A triggerer nem elérhető vagy nincs benne airflow"


      # 6. Lépés: Megnézzük a futó konténereket és környezeti változóikat
      - name: Debug Docker Environment
        run: |
          echo "=== Futó konténerek listája ==="
          docker compose ps
          
          echo "=== Konténer belső PATH változója ==="
          docker compose exec -T airflow-webserver env | grep PATH || echo "Nem sikerult lemerni az env-et"
