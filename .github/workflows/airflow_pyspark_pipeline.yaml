name: Airflow PySpark ETL Runner

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup environment
        run: |
          echo "AIRFLOW_UID=$(id -u)" > .env

      - name: Install curl
        run: |
          sudo apt-get update && sudo apt-get install -y curl

      - name: Build containers
        run: |
          docker compose build

      - name: Wait for Postgres
        run: |
          until docker compose exec -T postgres pg_isready -U airflow; do
            echo "Waiting postgres..."
            sleep 3
          done

      - name: Start Airflow init
        run: |
          docker compose up airflow-init

      - name: Start services
        run: |
          docker compose up -d

      - name: Check containers
        run: |
          docker compose ps

      - name: Wait for Airflow
        run: |
          for i in {1..40}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/health || echo "000")

            echo "Attempt $i - $STATUS"

            if [ "$STATUS" = "200" ]; then
              echo "Airflow ready"
              exit 0
            fi

            sleep 10
          done

          docker compose logs --tail=100 airflow-webserver
          exit 1

      - name: Trigger DAG
        run: |
          docker compose exec -T airflow-webserver airflow dags trigger medallion_orchestrator

      - name: Check DAG
        run: |
          docker compose exec -T airflow-webserver airflow dags list-runs -d medallion_orchestrator